<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyricStudio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 1.5rem;
            text-align: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .logo {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #f97316, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .tagline {
            font-size: 1.25rem;
            color: #a1a1aa;
            margin-bottom: 2.5rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #f97316, #ec4899);
            margin: 0 auto 2rem;
            border-radius: 1px;
        }

        .description {
            font-size: 1.1rem;
            color: #d4d4d8;
            line-height: 1.7;
            max-width: 550px;
            margin: 0 auto 3rem;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
            border-color: transparent;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.5);
        }

        .btn-outline {
            border-color: #3f3f46;
            color: #d4d4d8;
            background: transparent;
        }

        .btn-outline:hover {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.1);
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: #52525b;
        }

        .footer a {
            color: #a1a1aa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #f97316;
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 80%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">PyricStudio</h1>
        <p class="tagline">We ignite creative code.</p>
        <div class="divider"></div>
        <p class="description">
            A studio crafting tools, libraries, and experiments at the intersection of code and creativity.
            Built in the open, for the community.
        </p>

        <div class="buttons">
            <!-- 主按钮：前往 GitHub 组织 (pyric-studio) -->
            <a href="https://github.com/pyric-studio" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHub
            </a>
            <!-- 副按钮：查看所有仓库 -->
            <a href="https://github.com/orgs/pyric-studio/repositories" class="btn btn-outline" target="_blank" rel="noopener noreferrer">
                Explore Projects
            </a>
        </div>

        <div class="footer">
            <p>© 2025 PyricStudio · Hosted on <a href="https://github.com/pyric-studio" target="_blank" rel="noopener noreferrer">GitHub</a></p>
        </div>
    </div>
</body>
</html>

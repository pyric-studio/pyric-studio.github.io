<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyricStudio · 让灵感，在代码里燃烧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
            padding: 1.5rem;
            text-align: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 102, 204, 0.08), 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 153, 255, 0.12);
        }

        .logo {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #0066cc, #00b894);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.3rem;
            color: #475569;
            margin-bottom: 2rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #00b894, #0984e3);
            margin: 0 auto 2rem;
            border-radius: 2px;
        }

        .description {
            font-size: 1.1rem;
            color: #334155;
            line-height: 1.8;
            max-width: 550px;
            margin: 0 auto 2.5rem;
        }

        .creator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 180, 216, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #0077b6;
            margin-bottom: 2rem;
            transition: background 0.3s;
        }

        .creator:hover {
            background: rgba(0, 180, 216, 0.18);
        }

        .creator a {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0984e3, #00b894);
            color: #fff;
            box-shadow: 0 8px 20px rgba(9, 132, 227, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(9, 132, 227, 0.4);
        }

        .btn-outline {
            border-color: #0984e3;
            color: #0066cc;
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(9, 132, 227, 0.06);
            border-color: #00b894;
            color: #0077b6;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }

        .footer a:hover {
            color: #00b894;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.2rem;
            }
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">PyricStudio</h1>
        <p class="tagline">点燃创意，编码未来</p>
        <div class="divider"></div>
        <p class="description">
            我们是一个以技术为核心的学生组织，致力于打造开源工具、创意项目和学习社区。<br>
            在代码与灵感的交汇处，共同成长。
        </p>

        <!-- 创建者信息 -->
        <div class="creator">
            🚀 由 <a href="https://github.com/EricDing618" target="_blank" rel="noopener noreferrer">@EricDing618</a> 发起创建
        </div>

        <div class="buttons">
            <a href="https://github.com/pyric-studio" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                访问 GitHub
            </a>
            <a href="https://github.com/orgs/pyric-studio/repositories" class="btn btn-outline" target="_blank" rel="noopener noreferrer">
                探索项目
            </a>
        </div>

        <div class="footer">
            <p>© 2026 PyricStudio · 由 <a href="https://github.com/pyric-studio" target="_blank" rel="noopener noreferrer">GitHub Pages</a> 驱动</p>
        </div>
    </div>
</body>
</html>
